<aside class="otz-card-flat otz-risk-block{% if high %} is-high{% endif %}">
  <div class="otz-eyebrow">Risk signals</div>
  <strong>{{ title|default:'На что обратить внимание' }}</strong>
  <p class="otz-muted">{{ text|default:'Проверьте сроки, аванс, смету, гарантию и официальный ответ на жалобы.' }}</p>
  <div class="otz-trust-strip"><span class="otz-chip otz-chip-warning">Сроки</span><span class="otz-chip otz-chip-warning">Аванс</span><span class="otz-chip otz-chip-risk">Жалобы</span></div>
</aside>
