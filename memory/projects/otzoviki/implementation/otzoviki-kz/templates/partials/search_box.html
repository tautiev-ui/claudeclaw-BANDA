<div class="otz-search-box">
  <form class="otz-search-form" action="/search/" method="get" role="search">
    <input class="otz-search-input" name="q" type="search" placeholder="{{ placeholder|default:'Введите компанию, услугу или город…' }}" aria-label="Поиск">
    <button class="otz-btn otz-btn-primary" type="submit">{{ button_label|default:'Проверить' }}</button>
  </form>
</div>
