<header class="otz-site-header">
  <div class="otz-container otz-nav">
    <a class="otz-logo" href="/" aria-label="Otzoviki KZ">
      <span class="otz-logo-mark" aria-hidden="true">O</span>
      <span>Otzoviki</span>
    </a>
    <nav class="otz-nav-links" aria-label="Основная навигация">
      <a href="/kz/">Компании</a>
      <a href="/kz/almaty/reyting-remontnyh-kompaniy/">Рейтинги</a>
      <a href="/kz/guides/">Гайды</a>
      <a href="/methodology/">Методология</a>
    </nav>
    <nav class="otz-city-selector" data-city-selector="true" aria-label="Города">
      {% for city in city_selector_cities %}
        <span class="otz-city-group">
          <a class="otz-city-choice" href="{{ city.get_absolute_url }}">{{ city.name }}</a>
          <span class="otz-city-context-links" aria-label="Разделы города {{ city.name }}">
            <a href="{{ city.get_absolute_url }}remont-kvartir/">Ремонт</a>
            <a href="{{ city.get_absolute_url }}reyting-remontnyh-kompaniy/">Рейтинг</a>
            <a href="{{ city.get_absolute_url }}remont-kvartir/ceny/">Цены</a>
          </span>
        </span>
      {% empty %}
        <a class="otz-city-choice" href="/kz/">Казахстан</a>
      {% endfor %}
    </nav>
    <a class="otz-btn otz-btn-business" href="/for-business/">Для бизнеса</a>
  </div>
</header>
